<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;   /* stack image + text */
    justify-content: center;
    align-items: center;
    background: #ffffff;
    text-align: center;
    padding: 20px;
}

/* image styling */
a img{
    width: 80%;
    max-width: 350px;
    height: auto;
    display: block;
}

/* caption text */
.caption{
    margin-top: 15px;
    font-size: 16px;
    color: #333;
    font-family: Arial, sans-serif;
    line-height: 1.5;
}

.pointer{
    font-size: 18px;
    margin-top: 8px;
}
</style>

</head>

<body>

<a href="https://cocradowan-collab.github.io/birthday/">
    <img src="madam.jpg" alt="Clickable Image">
</a>

<div class="caption">
    tomr ei chok gula dekle sudhu dekhtei mon chay 🫠🫶
</div>

<div class="pointer">
    👉 click this photo
</div>

</body>
</html>
