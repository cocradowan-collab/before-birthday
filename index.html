<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;   /* center horizontally */
    align-items: center;       /* center vertically */
    background: #ffffff;
}

/* makes image responsive for mobile screens */
a img{
    width: 80%;
    max-width: 350px;
    height: auto;
    display: block;
}

/* better fit for tall phones */
@media (max-height: 1080px){
    body{
        padding: 20px;
    }

    a img{
        width: 70%;
        max-width: 320px;
    }
}
</style>

</head>

<body>

<a href="https://cocradowan-collab.github.io/birthday/">
    <img src="madam.jpg" alt="Clickable Image">
</a>

</body>
</html>
